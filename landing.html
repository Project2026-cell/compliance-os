<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Innovative OS | Initialize</title>
    <link href="https://fonts.googleapis.com/css2?family=Michroma&family=Orbitron:wght@400;800&family=Inter:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #004d40;
            --accent: #00e676;
            --bg-dark: #0f172a;
        }

        /* Reset and iOS Lockdown */
        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
        }

        html, body {
            margin: 0; padding: 0;
            width: 100%; 
            height: 100dvh; /* Dynamic height for iOS Safari */
            overflow: hidden; 
            overscroll-behavior: none;
            position: fixed;
            background: #0f172a;
        }

        body {
            background: radial-gradient(circle at top left, var(--primary), var(--bg-dark)) no-repeat;
            font-family: 'Inter', -apple-system, sans-serif;
            color: #fff;
            transition: opacity 0.8s ease;
        }

        #bg-canvas {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1; opacity: 0.35;
            pointer-events: none;
            will-change: transform;
        }

        .hero {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100dvh;
            z-index: 3;
            display: flex; justify-content: center; align-items: center;
            padding: 20px;
            touch-action: none;
        }

        /* SIDE VISUALS */
        .left-visual, .right-visual {
            position: absolute; bottom: 0;
            width: 30vw; min-width: 150px;
            z-index: 2; pointer-events: none;
        }
        .left-visual { left: 0; animation: floatLeft 6s ease-in-out infinite; }
        .right-visual { right: 0; animation: floatRight 6s ease-in-out infinite; }

        .left-visual img, .right-visual img {
            width: 100%; height: auto;
            opacity: 0.3; display: block;
        }

        @keyframes floatLeft { 0%, 100% { transform: translate(0,0); } 50% { transform: translate(10px,-10px); } }
        @keyframes floatRight { 0%, 100% { transform: translate(0,0); } 50% { transform: translate(-10px,-10px); } }

        /* CENTER CARD: iOS Optimized */
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            /* Safari Specific Blur */
            -webkit-backdrop-filter: blur(25px);
            backdrop-filter: blur(25px);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 40px 100px rgba(0,0,0,0.6);
            width: 100%; max-width: 420px;
            text-align: center;
            margin-bottom: 10vh;
            /* Hardware acceleration for iOS */
            transform: translateZ(0);
            animation: fadeInCenter 1.2s ease-out;
        }

        @keyframes fadeInCenter {
            from { opacity: 0; transform: scale(0.95) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.6rem, 8vw, 2.4rem);
            font-weight: 800;
            letter-spacing: 2px;
            margin: 10px 0;
            text-transform: uppercase;
            color: #ffffff !important;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }

        h1 span {
            color: var(--accent) !important;
            text-shadow: 0 0 20px rgba(0, 230, 118, 0.5);
        }

        p {
            font-family: 'Michroma', sans-serif;
            color: rgba(255, 255, 255, 0.5);
            font-size: clamp(7px, 2.2vw, 9px);
            margin: 15px 0 35px;
            line-height: 2;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* BUTTON: Touch-optimized */
        .enter-btn {
            position: relative;
            padding: 18px 0;
            width: 100%; max-width: 280px;
            background: rgba(0, 230, 118, 0.05);
            color: var(--accent);
            text-decoration: none;
            border-radius: 12px;
            font-family: 'Orbitron', sans-serif;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 3px;
            display: inline-block;
            cursor: pointer;
            border: 1px solid rgba(0, 230, 118, 0.4);
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .enter-btn:active {
            transform: scale(0.95);
            background: var(--accent);
            color: #000;
        }

        /* Scanning bar inside button */
        .enter-btn::after {
            content: '';
            position: absolute; top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 230, 118, 0.25), transparent);
            animation: scan 3s infinite linear;
        }

        @keyframes scan { 0% { left: -100%; } 100% { left: 100%; } }

        /* LOADING PROGRESS */
        #progress-container { display: none; margin-top: 20px; text-align: left; }
        .progress-label-wrap { display: flex; justify-content: space-between; font-family: monospace; font-size: 10px; color: var(--accent); margin-bottom: 8px; }
        .progress-track { width: 100%; height: 4px; background: rgba(255, 255, 255, 0.1); border-radius: 10px; overflow: hidden; }
        #progress-fill { width: 0%; height: 100%; background: var(--accent); transition: width 0.2s ease-out; }

        .footer-info {
            position: fixed; bottom: 20px;
            width: 100%; text-align: center;
            z-index: 5; padding: 0 20px;
            pointer-events: none;
        }

        .sys-code { font-family: monospace; font-size: 8px; color: var(--accent); opacity: 0.5; letter-spacing: 1px; }

        @media (max-width: 768px) {
            .glass-card { margin-bottom: 12vh; padding: 30px 20px; border-radius: 20px; }
            .left-visual, .right-visual { opacity: 0.15; width: 130px; }
        }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    
    <div class="left-visual"><img src="image_db6ab6.png" alt="Core"></div>
    <div class="right-visual"><img src="image_db6ab6_2.png" alt="Node"></div>

    <div class="hero">
        <div class="glass-card">
            <div style="font-family: 'Michroma', sans-serif; font-size: 8px; color: var(--accent); letter-spacing: 5px; margin-bottom: 5px;">PROTOCOL_INITIALIZE</div>
            <h1>INNOVATIVE<span>OS</span></h1>
            <p>Compliance & Acquisition Management<br>Secure Infrastructure V1</p>
            
            <div id="action-wrapper">
                <a href="login.html" class="enter-btn" id="start-init">Initialize System</a>
            </div>

            <div id="progress-container">
                <div class="progress-label-wrap">
                    <span id="status-text">MOUNTING_CORE...</span>
                    <span id="percent-text">0%</span>
                </div>
                <div class="progress-track"><div id="progress-fill"></div></div>
            </div>
        </div>
    </div>

    <div class="footer-info">
        <div class="sys-code">STATUS: ENCRYPTED // UPLINK_STABLE</div>
        <div style="font-size: 10px; color: rgba(255,255,255,0.3); margin-top: 8px;">Powered by Junzky</div>
    </div>

    <script>
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let lines = [];

        function resize() {
            // iOS visualViewport fix
            const v = window.visualViewport;
            canvas.width = v ? v.width : window.innerWidth;
            canvas.height = v ? v.height : window.innerHeight;
        }

        class DataStream {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * -canvas.height;
                this.length = Math.random() * 100 + 50;
                this.speed = Math.random() * 2 + 1;
                this.opacity = Math.random() * 0.3 + 0.1;
            }
            draw() {
                // Simplified drawing for mobile performance
                ctx.beginPath();
                ctx.strokeStyle = `rgba(0, 230, 118, ${this.opacity})`;
                ctx.lineWidth = 1;
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(this.x, this.y + this.length);
                ctx.stroke();
                this.y += this.speed;
                if (this.y > canvas.height) this.reset();
            }
        }

        function init() { lines = []; for(let i=0; i<40; i++) lines.push(new DataStream()); }
        
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for(let i=0; i<lines.length; i++) lines[i].draw();
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', resize);
        if(window.visualViewport) window.visualViewport.addEventListener('resize', resize);
        
        resize(); init(); animate();

        // Progress Logic
        const startBtn = document.getElementById('start-init');
        const progressContainer = document.getElementById('progress-container');
        const actionWrapper = document.getElementById('action-wrapper');

        startBtn.addEventListener('click', function(e) {
            e.preventDefault();
            actionWrapper.style.display = 'none';
            progressContainer.style.display = 'block';

            let width = 0;
            const fill = document.getElementById('progress-fill');
            const pText = document.getElementById('percent-text');
            const sText = document.getElementById('status-text');
            const msgs = ["MOUNTING...", "DECRYPTING...", "UPLINKING...", "READY"];

            const timer = setInterval(() => {
                if (width >= 100) {
                    clearInterval(timer);
                    document.body.style.opacity = '0';
                    setTimeout(() => { window.location.href = "login.html"; }, 500);
                } else {
                    width += Math.floor(Math.random() * 15) + 5;
                    if (width > 100) width = 100;
                    fill.style.width = width + '%';
                    pText.innerText = width + '%';
                    if (width > 75) sText.innerText = msgs[3];
                    else if (width > 50) sText.innerText = msgs[2];
                    else if (width > 25) sText.innerText = msgs[1];
                }
            }, 180); 
        });
    </script>
</body>
</html>
